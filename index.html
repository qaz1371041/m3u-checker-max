<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>IPTV Server Max - 直播源验证系统</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
 <style>
  /* ── 基础色板 ── */
  :root {
    --bg-deep: #080c14;
    --bg-panel: #0f172a;
    --border-muted: rgba(148,163,184,0.15);
    --text-primary: #e2e8f0;
    --text-muted: #64748b;
    --accent: #38bdf8;
    --accent-dim: rgba(56,189,248,0.1);
    --green: #34d399;
    --orange: #fb923c;
    --red: #f87171;
    --radius: 10px;
  }
  body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    min-height: 100vh;
    padding: 2rem 0;
  }
  /* ── 卡片 ── */
  .card {
    background: var(--bg-panel);
    border: 1px solid var(--border-muted);
    border-radius: var(--radius);
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .card-header {
    background: transparent;
    border-bottom: 1px solid var(--border-muted);
    padding: 1rem 1.5rem;
  }
  .card-body { padding: 1.5rem; }
  /* ── 标题 ── */
  .site-title {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .site-title span { color: var(--accent); }
  .site-subtitle { color: var(--text-muted); font-size: 0.85rem; }
  /* ── 统计卡片 ── */
  .stat-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border-muted);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    text-align: center;
    min-width: 100px;
  }
  .stat-card .num {
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--accent);
    line-height: 1.2;
  }
  .stat-card .label {
    font-size: 0.7rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }
  /* ── 按钮 ── */
  .btn-dl {
    border: 1px solid var(--border-muted);
    background: rgba(255,255,255,0.04);
    color: var(--text-primary);
    border-radius: 6px;
    padding: 0.45rem 1rem;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.2s;
    text-decoration: none;
    white-space: nowrap;
  }
  .btn-dl:hover {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  /* ── 类别折叠 ── */
  .cat-header {
    cursor: pointer;
    user-select: none;
    padding: 0.65rem 1rem;
    border-bottom: 1px solid var(--border-muted);
    transition: background 0.15s;
  }
  .cat-header:hover { background: rgba(255,255,255,0.03); }
  .cat-header .cat-name { font-weight: 600; color: var(--accent); }
  .cat-header .cat-count {
    font-size: 0.8rem;
    color: var(--text-muted);
    background: rgba(255,255,255,0.06);
    padding: 1px 10px;
    border-radius: 10px;
  }
  .cat-header .chevron {
    transition: transform 0.2s;
    color: var(--text-muted);
    font-size: 0.8rem;
  }
  .cat-header .chevron.open { transform: rotate(90deg); }
  .cat-body { display: none; }
  .cat-body.open { display: table-row-group; }
  /* ── 频道行 ── */
  .chan-row {
    border-bottom: 1px solid rgba(255,255,255,0.03);
    transition: background 0.15s;
  }
  .chan-row:hover { background: rgba(255,255,255,0.04); }
  .chan-row td { padding: 0.4rem 1rem !important; vertical-align: middle; }
  .chan-row .idx { color: var(--text-muted); font-size: 0.8rem; width: 40px; }
  .chan-row .name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
  .chan-row .url-cell { max-width: 0; }
  .chan-row .url-cell a {
    color: #94a3b8;
    font-size: 0.82rem;
    text-decoration: none;
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .chan-row .url-cell a:hover { color: var(--accent); }
  .chan-row .copy-btn {
    background: transparent;
    border: 1px solid var(--border-muted);
    color: var(--text-muted);
    border-radius: 4px;
    padding: 2px 10px;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .chan-row .copy-btn:hover {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  /* ── 分类筛选 ── */
  .filter-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .filter-pill {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border-muted);
    color: var(--text-muted);
    border-radius: 14px;
    padding: 3px 14px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-pill:hover { border-color: var(--accent); color: var(--text-primary); }
  .filter-pill.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); font-weight: 600; }
  .filter-pill.all { border-color: transparent; color: var(--text-muted); }
  .filter-pill.all.active { color: var(--text-primary); font-weight: 600; }
  /* ── 搜索框 ── */
  .search-input {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border-muted);
    color: var(--text-primary);
    border-radius: 8px;
    padding: 0.45rem 0.9rem;
    font-size: 0.85rem;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: #475569; }
  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999;
    background: var(--bg-panel); border: 1px solid var(--accent);
    border-radius: 8px; padding: 0.6rem 1.2rem;
    font-size: 0.85rem; font-weight: 500;
    color: var(--accent);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    opacity: 0; transition: opacity 0.25s; pointer-events: none;
  }
  #toast.show { opacity: 1; }
  /* ── 空状态 ── */
  #empty-msg { display: none; }
  /* ── 响应式 ── */
  @media (max-width: 768px) {
    body { padding: 1rem 0; }
    .card-body { padding: 1rem; }
    .stat-grid { gap: 6px; }
    .stat-card { min-width: 70px; padding: 0.5rem; }
    .stat-card .num { font-size: 1.1rem; }
    .btn-group-dl { gap: 4px; }
    .btn-dl { padding: 0.3rem 0.6rem; font-size: 0.75rem; }
    .chan-row .name { max-width: 120px; }
    .cat-header { padding: 0.5rem 0.75rem; }
    .chan-row td { padding: 0.3rem 0.75rem !important; }
    .filter-pills { gap: 4px; }
    .filter-pill { padding: 2px 10px; font-size: 0.72rem; }
  }
 </style>
</head>
<body>
<div class="container-lg">

  <!-- ── 标题 ── -->
  <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
    <div>
      <div class="site-title">📡 <span>IPTV</span> M3U Checker Max</div>
      <div class="site-subtitle">全网高并发验证 · 极速源排序 · EPG 聚合</div>
    </div>
    <div id="last-update" class="site-subtitle" style="font-size:0.78rem;">⏳ 加载中...</div>
  </div>

  <!-- ── 统计行 ── -->
  <div class="d-flex flex-wrap gap-2 stat-grid mb-3" id="stats-row">
    <div class="stat-card"><div class="num" id="s-total">-</div><div class="label">直播频道</div></div>
    <div class="stat-card"><div class="num" id="s-cats">-</div><div class="label">分类</div></div>
    <div class="stat-card"><div class="num" id="s-m3u">-</div><div class="label">M3U 大小</div></div>
    <div class="stat-card"><div class="num" id="s-epg">-</div><div class="label">EPG 频道</div></div>
    <div class="stat-card"><div class="num" id="s-sources">-</div><div class="label">播放源</div></div>
  </div>

  <!-- ── 下载按钮 ── -->
  <div class="d-flex flex-wrap gap-2 mb-3 btn-group-dl">
    <a href="https://gh.felicity.ac.cn/https://raw.githubusercontent.com/JE668/m3u-checker-max/main/output/live.m3u" class="btn-dl" download>⬇ M3U</a>
    <a href="https://gh.felicity.ac.cn/https://raw.githubusercontent.com/JE668/m3u-checker-max/main/output/live.txt" class="btn-dl" download>⬇ TXT</a>
    <a href="https://gh.felicity.ac.cn/https://raw.githubusercontent.com/JE668/m3u-checker-max/main/output/epg.xml" class="btn-dl" target="_blank">📺 EPG</a>
    <a href="https://gh.felicity.ac.cn/https://raw.githubusercontent.com/JE668/m3u-checker-max/main/output/epg.xml.gz" class="btn-dl" download>🗜 EPG(GZ)</a>
    <a href="https://gh.felicity.ac.cn/https://raw.githubusercontent.com/JE668/m3u-checker-max/main/output/log.txt" class="btn-dl" target="_blank">📄 日志</a>
  </div>

  <!-- ── 卡片 ── -->
  <div class="card">
    <div class="card-header d-flex flex-wrap align-items-center gap-3">
      <!-- 搜索 -->
      <input type="text" id="search" class="search-input" style="flex:1;min-width:160px;" placeholder="🔍 搜索频道名称…" autocomplete="off">
      <!-- 分类筛选 -->
      <div class="filter-pills" id="filter-pills"></div>
    </div>
    <div class="card-body p-0">
      <!-- 表格 -->
      <table class="table table-borderless align-middle mb-0" style="width:100%;">
        <tbody id="channels-tbody">
          <tr><td colspan="4" class="text-center py-5" style="color:var(--text-muted);">
            <div class="mb-2" style="font-size:1.5rem;">⏳</div>
            <div>正在加载频道数据...</div>
          </td></tr>
        </tbody>
      </table>
      <!-- 空状态 -->
      <div id="empty-msg" class="text-center py-5" style="color:var(--text-muted);">
        <div style="font-size:2rem;margin-bottom:0.5rem;">🔍</div>
        <div>没有匹配的频道</div>
        <button class="btn-dl mt-2" onclick="resetFilter()">重置筛选</button>
      </div>
    </div>
  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

<script>
/* ── 数据 ── */
const DATA_URL = 'output/live.txt';
const PAGE_SIZE = 50;
let categories = {};               // { catName: { chs: [{name,url}], collapsed: false } }
let catList = [];                 // 有序的分类名
let currentFilterCat = '__all__'; // '__all__' 或分类名
let searchTerm = '';

/* ── XSS ── */
const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };

/* ── Toast ── */
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = '✅ ' + msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

/* ── 复制 ── */
function copyUrl(url) {
  navigator.clipboard.writeText(url).then(() => toast('已复制到剪贴板')).catch(() => {});
}

/* ── 格式化文件大小 ── */
function fmtSize(bytes) {
  if (!bytes || bytes === 0) return 'N/A';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}

/* ── 从 log.txt 提取补充统计 ── */
async function fetchExtraStats() {
  try {
    const r = await fetch('output/log.txt');
    const txt = await r.text();
    const lines = txt.split('\n');
    let epgCount = 'N/A', m3uSize = 'N/A', updateTime = '';
    for (let i = 0; i < lines.length; i++) {
      const l = lines[i].trim();
      if (l.startsWith('任务时间:')) updateTime = l.replace('任务时间:','').trim();
      if (l.startsWith('EPG 共') && l.includes('个频道')) {
        const m = l.match(/(\d+)\s*个频道/);
        if (m) epgCount = m[1];
      }
    }
    // fetch M3U size via HEAD
    try {
      const h = await fetch('output/live.m3u', { method: 'HEAD' });
      m3uSize = fmtSize(parseInt(h.headers.get('content-length') || '0'));
    } catch(e) {}
    return { epgCount, m3uSize, updateTime };
  } catch(e) { return { epgCount: 'N/A', m3uSize: 'N/A', updateTime: '' }; }
}

/* ── 渲染 ── */
function render() {
  const tbody = document.getElementById('channels-tbody');
  const emptyMsg = document.getElementById('empty-msg');

  // 先确定要显示哪些分类
  const showCats = catList.filter(cat => {
    if (currentFilterCat !== '__all__') return cat === currentFilterCat;
    return true;
  }).filter(cat => {
    if (!searchTerm) return true;
    return cat.toLowerCase().includes(searchTerm) ||
      categories[cat].chs.some(ch => ch.name.toLowerCase().includes(searchTerm));
  });

  let html = '';
  let totalCh = 0, totalSources = 0;

  for (const cat of showCats) {
    const catData = categories[cat];
    const chs = catData.chs;
    // 搜索时过滤该分类下的频道
    let visibleChs = chs;
    if (searchTerm) {
      visibleChs = chs.filter(ch => ch.name.toLowerCase().includes(searchTerm) || cat.toLowerCase().includes(searchTerm));
    }
    if (visibleChs.length === 0) continue;

    const collapsed = catData.collapsed ? '' : 'open';
    const chevron = catData.collapsed ? '' : 'open';

    html += `<tr class="cat-header" data-cat="${esc(cat)}" onclick="toggleCat('${esc(cat)}')">
      <td colspan="4" style="padding:0;">
        <div class="d-flex align-items-center gap-2">
          <span class="chevron ${chevron}">▶</span>
          <span class="cat-name">📂 ${esc(cat)}</span>
          <span class="cat-count">${visibleChs.length}</span>
        </div>
      </td>
    </tr>`;

    if (!catData.collapsed) {
      let idx = 1;
      for (const ch of visibleChs) {
        totalCh++;
        totalSources += 1; // 每行一个源（实际可能有多个，但每个url一条记录）
        html += `<tr class="chan-row">
          <td class="idx">${idx++}</td>
          <td class="name" title="${esc(ch.name)}">${esc(ch.name)}</td>
          <td class="url-cell"><a href="${esc(ch.url)}" target="_blank" rel="noopener" title="${esc(ch.url)}">${esc(ch.url)}</a></td>
          <td style="width:70px;text-align:right;"><button class="copy-btn" onclick="copyUrl('${esc(ch.url)}')">复制</button></td>
        </tr>`;
      }
    }
  }

  // 分类统计数
  document.getElementById('s-cats').textContent = catList.length;
  document.getElementById('s-total').textContent = totalCh;
  document.getElementById('s-sources').textContent = totalSources;

  if (html) {
    tbody.innerHTML = html;
    emptyMsg.style.display = 'none';
  } else if (catList.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4" class="text-center py-5" style="color:var(--text-muted);">
      <div style="font-size:2rem;margin-bottom:0.5rem;">📡</div>
      <div>暂无数据，等待工作流执行完成...</div>
    </td></tr>`;
    emptyMsg.style.display = 'none';
  } else {
    tbody.innerHTML = '';
    emptyMsg.style.display = 'block';
  }
}

/* ── 分类折叠 ── */
function toggleCat(cat) {
  if (!categories[cat]) return;
  categories[cat].collapsed = !categories[cat].collapsed;
  render();
}

/* ── 全部展开/收起 ── */
function expandAll() { for (const c of catList) categories[c].collapsed = false; render(); }
function collapseAll() { for (const c of catList) categories[c].collapsed = true; render(); }

/* ── 重置筛选 ── */
function resetFilter() {
  document.getElementById('search').value = '';
  searchTerm = '';
  currentFilterCat = '__all__';
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  document.querySelector('.filter-pill.all').classList.add('active');
  render();
}

/* ── 主流程 ── */
async function main() {
  const pillsContainer = document.getElementById('filter-pills');

  // 创建"全部"按钮
  const allPill = document.createElement('span');
  allPill.className = 'filter-pill all active';
  allPill.textContent = '📋 全部';
  allPill.onclick = () => {
    currentFilterCat = '__all__';
    document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
    allPill.classList.add('active');
    render();
  };
  pillsContainer.appendChild(allPill);

  // 展开/收起按钮
  const expandBtn = document.createElement('span');
  expandBtn.className = 'filter-pill';
  expandBtn.textContent = '📂 展开全部';
  expandBtn.onclick = expandAll;
  pillsContainer.appendChild(expandBtn);

  const collapseBtn = document.createElement('span');
  collapseBtn.className = 'filter-pill';
  collapseBtn.textContent = '📁 收起全部';
  collapseBtn.onclick = collapseAll;
  pillsContainer.appendChild(collapseBtn);

  // 提取 live.txt
  try {
    const resp = await fetch(DATA_URL);
    const data = await resp.text();
    const lines = data.split('\n');

    let currentCat = '__未分类__';
    let lastWasCat = false;

    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed) continue;

      // 分类行：含 #genre# 或空行后独立的纯文本行
      if (trimmed.includes('#genre#')) {
        currentCat = trimmed.split(',')[0].trim();
        lastWasCat = true;
      } else if (trimmed.indexOf(',') === -1) {
        // 无逗号 → 分类行 (live.txt 格式：分类名单独一行)
        currentCat = trimmed;
        lastWasCat = true;
      } else {
        // 有逗号 → 频道行 name,url
        const commaIdx = trimmed.indexOf(',');
        const name = trimmed.slice(0, commaIdx).trim();
        const url = trimmed.slice(commaIdx + 1).trim();
        if (!name || !url) continue;
        lastWasCat = false;

        if (!categories[currentCat]) {
          categories[currentCat] = { chs: [], collapsed: false };
          catList.push(currentCat);
        }
        categories[currentCat].chs.push({ name, url });
      }

      // 分类行（#genre# 或纯文本分类）需确保存在
      if (lastWasCat && !categories[currentCat]) {
        categories[currentCat] = { chs: [], collapsed: false };
        catList.push(currentCat);
      }
    }

    // 建分类 pill
    for (const cat of catList) {
      const pill = document.createElement('span');
      pill.className = 'filter-pill';
      pill.textContent = esc(cat) + ' (' + categories[cat].chs.length + ')';
      pill.onclick = () => {
        currentFilterCat = cat;
        document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        // 展开该分类
        categories[cat].collapsed = false;
        render();
      };
      pillsContainer.appendChild(pill);
    }

    // 加载额外统计
    fetchExtraStats().then(stats => {
      if (stats.epgCount) document.getElementById('s-epg').textContent = stats.epgCount;
      if (stats.m3uSize) document.getElementById('s-m3u').textContent = stats.m3uSize;
      if (stats.updateTime) document.getElementById('last-update').textContent = '🕐 ' + stats.updateTime;
    });

    // 渲染
    render();

  } catch(err) {
    document.getElementById('channels-tbody').innerHTML =
      `<tr><td colspan="4" class="text-center py-5" style="color:var(--red);">
        <div style="font-size:2rem;margin-bottom:0.5rem;">⚠️</div>
        <div>数据加载失败，请确认工作流已执行完毕。</div>
        <div style="font-size:0.8rem;margin-top:0.3rem;color:var(--text-muted);">${esc(err.message)}</div>
      </tr>`;
  }
}

/* ── 搜索 ── */
document.getElementById('search').addEventListener('input', function() {
  searchTerm = this.value.toLowerCase().trim();
  render();
});

/* ── 启动 ── */
main();
</script>
</body>
</html>
