<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>IPTV Server Max - 直播源自动验证系统</title>
 <!-- Bootstrap 5 CSS -->
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
 <style>
 /* 科技感深色主题 CSS 变量 */
 :root {
 --neon-cyan: #00f3ff;
 --neon-blue: #3b82f6;
 --neon-purple: #8b5cf6;
 --dark-bg: #090b10;
 --glass-bg: rgba(15, 23, 42, 0.75);
 --glass-border: rgba(0, 243, 255, 0.2);
 --text-main: #e2e8f0;
 }

 body {
 background-color: var(--dark-bg);
 color: var(--text-main);
 font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
 background-image: 
 radial-gradient(circle at 50% 0%, #112240 0%, var(--dark-bg) 60%),
 linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
 linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
 background-size: 100% 100%, 30px 30px, 30px 30px;
 min-height: 100vh;
 padding-top: 3rem;
 padding-bottom: 3rem;
 }

 /* 核心毛玻璃面板 */
 .glass-panel {
 background: var(--glass-bg);
 backdrop-filter: blur(16px);
 -webkit-backdrop-filter: blur(16px);
 border: 1px solid var(--glass-border);
 border-radius: 16px;
 box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(0, 243, 255, 0.05);
 padding: 2.5rem;
 }

 /* 霓虹发光标题 */
 h2.title-glow {
 color: #fff;
 text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-blue);
 font-weight: 800;
 letter-spacing: 2px;
 margin-bottom: 2rem;
 text-transform: uppercase;
 }

 /* 按钮全局特效 */
 .btn-custom {
 transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
 border-radius: 8px;
 font-weight: 600;
 letter-spacing: 1px;
 text-transform: uppercase;
 border: 1px solid transparent;
 padding: 0.6rem 1.2rem;
 position: relative;
 overflow: hidden;
 }
 
 /* 各种按钮的霓虹配色 */
 .btn-m3u { background: rgba(0, 243, 255, 0.1); color: var(--neon-cyan); border-color: var(--neon-cyan); }
 .btn-m3u:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 20px var(--neon-cyan); }

 .btn-txt { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border-color: #3b82f6; }
 .btn-txt:hover { background: #3b82f6; color: #fff; box-shadow: 0 0 20px #3b82f6; }

 .btn-epg { background: rgba(245, 158, 11, 0.1); color: #fbbf24; border-color: #f59e0b; }
 .btn-epg:hover { background: #f59e0b; color: #000; box-shadow: 0 0 20px #f59e0b; }

 .btn-gz { background: rgba(239, 68, 68, 0.1); color: #f87171; border-color: #ef4444; }
 .btn-gz:hover { background: #ef4444; color: #fff; box-shadow: 0 0 20px #ef4444; }

 .btn-log { background: rgba(156, 163, 175, 0.1); color: #9ca3af; border-color: #6b7280; }
 .btn-log:hover { background: #6b7280; color: #fff; box-shadow: 0 0 20px #6b7280; }

 /* 表格科技感美化 */
 .table { color: #cbd5e1; margin-bottom: 0; }
 .table-dark th { background-color: rgba(0, 0, 0, 0.5); border-bottom: 2px solid var(--neon-cyan); color: var(--neon-cyan); font-weight: 600; letter-spacing: 1px; }
 .table-hover tbody tr { border-bottom: 1px solid rgba(255,255,255,0.05); transition: background-color 0.2s; }
 .table-hover tbody tr:hover { background-color: rgba(0, 243, 255, 0.08); color: #fff; }
 
 /* 标签与链接 */
 .badge-custom { background: rgba(0, 243, 255, 0.1); border: 1px solid var(--neon-cyan); color: var(--neon-cyan); font-weight: normal; padding: 0.35em 0.65em; }
 .category-row { background: rgba(59, 130, 246, 0.1) !important; color: #60a5fa !important; text-shadow: 0 0 8px rgba(59, 130, 246, 0.5); letter-spacing: 2px; }
 
 a.text-break { color: #94a3b8; transition: all 0.3s; text-decoration: none; }
 a.text-break:hover { color: var(--neon-cyan); text-shadow: 0 0 8px var(--neon-cyan); }

 .copy-btn { border-color: #60a5fa; color: #60a5fa; background: transparent; padding: 0.25rem 0.75rem; border-radius: 6px; transition: all 0.3s; }
 .copy-btn:hover { background: #60a5fa; color: #000; box-shadow: 0 0 10px #60a5fa; }

 /* 搜索框 */
 .search-box {
 background: rgba(15, 23, 42, 0.8);
 border: 1px solid var(--glass-border);
 color: var(--text-main);
 border-radius: 8px;
 }
 .search-box:focus {
 background: rgba(15, 23, 42, 0.9);
 border-color: var(--neon-cyan);
 box-shadow: 0 0 12px rgba(0, 243, 255, 0.3);
 color: #fff;
 }
 .search-box::placeholder { color: #64748b; }

 /* Toast 通知 */
 .toast-container {
 position: fixed;
 bottom: 1.5rem;
 right: 1.5rem;
 z-index: 9999;
 }
 .toast-item {
 background: rgba(15, 23, 42, 0.95);
 backdrop-filter: blur(12px);
 border: 1px solid var(--neon-cyan);
 color: var(--neon-cyan);
 border-radius: 10px;
 padding: 0.8rem 1.2rem;
 margin-top: 0.5rem;
 font-weight: 600;
 box-shadow: 0 4px 20px rgba(0, 243, 255, 0.3);
 animation: slideIn 0.3s ease-out;
 }
 .toast-item.fade-out {
 animation: slideOut 0.3s ease-in forwards;
 }
 @keyframes slideIn {
 from { opacity: 0; transform: translateX(60px); }
 to { opacity: 1; transform: translateX(0); }
 }
 @keyframes slideOut {
 from { opacity: 1; transform: translateX(0); }
 to { opacity: 0; transform: translateX(60px); }
 }

 /* 分页 */
 .pagination .page-link {
 background: rgba(15, 23, 42, 0.8);
 border-color: var(--glass-border);
 color: var(--text-main);
 }
 .pagination .page-link:hover {
 background: var(--neon-cyan);
 color: #000;
 box-shadow: 0 0 10px var(--neon-cyan);
 }
 .pagination .active .page-link {
 background: var(--neon-cyan);
 color: #000;
 border-color: var(--neon-cyan);
 }
 .pagination .disabled .page-link {
 color: #475569;
 }

 /* 统计栏 */
 .stats-bar {
 display: flex;
 gap: 1.5rem;
 justify-content: center;
 flex-wrap: wrap;
 margin-bottom: 1.5rem;
 }
 .stat-item {
 background: rgba(0, 243, 255, 0.05);
 border: 1px solid rgba(0, 243, 255, 0.15);
 border-radius: 10px;
 padding: 0.6rem 1.2rem;
 text-align: center;
 }
 .stat-value {
 font-size: 1.4rem;
 font-weight: 800;
 color: var(--neon-cyan);
 text-shadow: 0 0 8px rgba(0, 243, 255, 0.4);
 }
 .stat-label {
 font-size: 0.75rem;
 color: #64748b;
 text-transform: uppercase;
 letter-spacing: 1px;
 }

 /* 隐藏行 */
 .row-hidden { display: none; }
 </style>
</head>
<body>
<div class="container">
 <div class="glass-panel">
 <h2 class="text-center title-glow">📡 IPTV M3U Checker Max</h2>
 <p class="text-center text-muted mb-4">全网高并发验证 / 极速源排序 / EPG 聚合防伪过滤系统</p>
 
 <!-- 下载按钮区 -->
 <div class="d-flex justify-content-center gap-3 mb-4 flex-wrap">
 <a href="https://gh.felicity.ac.cn/https://raw.githubusercontent.com/JE668/m3u-checker-max/main/output/live.m3u" class="btn btn-custom btn-m3u" download>⬇️ 下载 M3U</a>
 <a href="https://gh.felicity.ac.cn/https://raw.githubusercontent.com/JE668/m3u-checker-max/main/output/live.txt" class="btn btn-custom btn-txt" download>⬇️ 下载 TXT</a>
 <a href="https://gh.felicity.ac.cn/https://raw.githubusercontent.com/JE668/m3u-checker-max/main/output/epg.xml" class="btn btn-custom btn-epg" target="_blank">📺 EPG (XML)</a>
 <a href="https://gh.felicity.ac.cn/https://raw.githubusercontent.com/JE668/m3u-checker-max/main/output/epg.xml.gz" class="btn btn-custom btn-gz" download>🗜️ EPG (GZ)</a>
 <a href="https://gh.felicity.ac.cn/https://raw.githubusercontent.com/JE668/m3u-checker-max/main/output/log.txt" class="btn btn-custom btn-log" target="_blank">📄 系统日志</a>
 </div>

 <!-- 统计栏 -->
 <div class="stats-bar" id="stats-bar">
 <div class="stat-item"><div class="stat-value" id="stat-total">-</div><div class="stat-label">频道总数</div></div>
 <div class="stat-item"><div class="stat-value" id="stat-cats">-</div><div class="stat-label">分类数</div></div>
 <div class="stat-item"><div class="stat-value" id="stat-sources">-</div><div class="stat-label">源总数</div></div>
 </div>

 <!-- 搜索栏 -->
 <div class="row mb-3">
 <div class="col-md-6 mx-auto">
 <input type="text" id="search-input" class="form-control search-box" placeholder="🔍 搜索频道名称或分类..." autocomplete="off">
 </div>
 </div>

 <div class="table-responsive rounded">
 <table class="table table-hover align-middle">
 <thead class="table-dark">
 <tr>
 <th scope="col" width="8%">#</th>
 <th scope="col" width="22%">频道名称</th>
 <th scope="col" width="55%">真实播放流 (按速度最优排序)</th>
 <th scope="col" width="15%" class="text-center">操作</th>
 </tr>
 </thead>
 <tbody id="channel-list">
 <tr><td colspan="4" class="text-center py-4">
 <div class="spinner-border text-info" role="status"></div>
 <div class="mt-2" style="color: var(--neon-cyan);">系统正在加载核心数据，请稍候...</div>
 </td></tr>
 </tbody>
 </table>
 </div>

 <!-- 分页控件 -->
 <nav class="mt-3" id="pagination-nav" style="display:none;">
 <ul class="pagination justify-content-center" id="pagination"></ul>
 </nav>
 </div>
</div>

<!-- Toast 容器 -->
<div class="toast-container" id="toast-container"></div>

<script>
 const PAGE_SIZE = 50;
 let allRows = []; // 所有行的 HTML
 let filteredRows = []; // 过滤后的行 HTML
 let currentPage = 1;
 let channelCount = 0, categoryCount = 0, sourceCount = 0;

 // P2-13: XSS 防护 — 转义 HTML 特殊字符
 function esc(str) {
 const d = document.createElement('div');
 d.textContent = str;
 return d.innerHTML;
 }

 fetch('output/live.txt')
 .then(response => response.text())
 .then(data => {
 const lines = data.split('\n');
 let index = 1;
 let currentCategory = '未分类节点';

 lines.forEach(line => {
 line = line.trim();
 if (!line) return;

 if (line.includes('#genre#')) {
 currentCategory = line.split(',')[0];
 categoryCount++;
 const safeCat = esc(currentCategory);
 const html = `<tr class="category-row" data-category="${safeCat}"><td colspan="4" class="text-center fw-bold">📂 ${safeCat}</td></tr>`;
 allRows.push({ type: 'cat', html, category: currentCategory });
 } else if (line.includes(',')) {
 const parts = line.split(',');
 const name = parts[0];
 const url = parts.slice(1).join(','); // URL 可能含逗号
 sourceCount++;
 channelCount++;
 const safeName = esc(name);
 const safeUrl = esc(url);
 const html = `<tr data-category="${esc(currentCategory)}" data-name="${name.toLowerCase()}" data-url="${url.toLowerCase()}">
 <td><span class="text-secondary">${index++}</span></td>
 <td class="fw-bold"><span class="badge badge-custom me-2">${esc(currentCategory)}</span>${safeName}</td>
 <td><a href="${safeUrl}" target="_blank" rel="noopener noreferrer" class="text-break">${safeUrl}</a></td>
 <td class="text-center"><button class="copy-btn" data-url="${safeUrl}">复制源</button></td>
 </tr>`;
 allRows.push({ type: 'channel', html, category: currentCategory, name: name.toLowerCase(), url: url.toLowerCase() });
 }
 });

 // 事件委托：复制按钮（避免 inline onclick 的 XSS 风险）
 document.getElementById('channel-list').addEventListener('click', function(e) {
 const btn = e.target.closest('.copy-btn');
 if (btn) copyToClipboard(btn.dataset.url);
 });

 // 统计
 document.getElementById('stat-total').textContent = channelCount;
 document.getElementById('stat-cats').textContent = categoryCount;
 document.getElementById('stat-sources').textContent = sourceCount;

 filteredRows = [...allRows];
 renderPage();
 })
 .catch(err => {
 document.getElementById('channel-list').innerHTML = '<tr><td colspan="4" class="text-center text-danger">⚠️ 核心数据加载失败，请检查仓库工作流是否执行完毕。</td></tr>';
 });

 // 搜索过滤
 document.getElementById('search-input').addEventListener('input', function() {
 const q = this.value.toLowerCase().trim();
 if (!q) {
 filteredRows = [...allRows];
 } else {
 // 先收集匹配的分类名
 const matchedCats = new Set();
 filteredRows = [];
 allRows.forEach(row => {
 if (row.type === 'cat') {
 if (row.category.toLowerCase().includes(q)) matchedCats.add(row.category);
 } else {
 if (row.name.includes(q) || row.url.includes(q)) matchedCats.add(row.category);
 }
 });
 allRows.forEach(row => {
 if (row.type === 'cat') {
 if (matchedCats.has(row.category)) filteredRows.push(row);
 } else {
 if (row.name.includes(q) || row.url.includes(q) || matchedCats.has(row.category)) filteredRows.push(row);
 }
 });
 }
 currentPage = 1;
 renderPage();
 });

 function renderPage() {
 const totalPages = Math.max(1, Math.ceil(filteredRows.length / PAGE_SIZE));
 if (currentPage > totalPages) currentPage = totalPages;

 const start = (currentPage - 1) * PAGE_SIZE;
 const end = start + PAGE_SIZE;
 const pageRows = filteredRows.slice(start, end);

 document.getElementById('channel-list').innerHTML = pageRows.map(r => r.html).join('')
 || '<tr><td colspan="4" class="text-center text-muted">没有匹配的频道</td></tr>';

 renderPagination(totalPages);
 }

 function renderPagination(totalPages) {
 const nav = document.getElementById('pagination-nav');
 const ul = document.getElementById('pagination');
 if (totalPages <= 1) { nav.style.display = 'none'; return; }
 nav.style.display = '';
 let html = '';
 html += `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="goPage(${currentPage - 1})">‹</a></li>`;

 const maxVisible = 7;
 let startP = Math.max(1, currentPage - 3);
 let endP = Math.min(totalPages, startP + maxVisible - 1);
 if (endP - startP < maxVisible - 1) startP = Math.max(1, endP - maxVisible + 1);

 if (startP > 1) { html += `<li class="page-item"><a class="page-link" href="#" onclick="goPage(1)">1</a></li>`; if (startP > 2) html += `<li class="page-item disabled"><span class="page-link">…</span></li>`; }
 for (let i = startP; i <= endP; i++) {
 html += `<li class="page-item ${i === currentPage ? 'active' : ''}"><a class="page-link" href="#" onclick="goPage(${i})">${i}</a></li>`;
 }
 if (endP < totalPages) { if (endP < totalPages - 1) html += `<li class="page-item disabled"><span class="page-link">…</span></li>`; html += `<li class="page-item"><a class="page-link" href="#" onclick="goPage(${totalPages})">${totalPages}</a></li>`; }

 html += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}"><a class="page-link" href="#" onclick="goPage(${currentPage + 1})">›</a></li>`;
 ul.innerHTML = html;
 }

 function goPage(p) {
 const totalPages = Math.ceil(filteredRows.length / PAGE_SIZE);
 if (p < 1 || p > totalPages) return;
 currentPage = p;
 renderPage();
 window.scrollTo({ top: 0, behavior: 'smooth' });
 return false;
 }

 // Toast 通知
 function showToast(msg, duration = 2000) {
 const container = document.getElementById('toast-container');
 const el = document.createElement('div');
 el.className = 'toast-item';
 el.textContent = msg;
 container.appendChild(el);
 setTimeout(() => { el.classList.add('fade-out'); setTimeout(() => el.remove(), 300); }, duration);
 }

 function copyToClipboard(text) {
 navigator.clipboard.writeText(text).then(() => {
 showToast('✅ 播放流链接已复制');
 }).catch(() => {
 showToast('❌ 复制失败，请手动复制');
 });
 }
</script>
</body>
</html>
