name: 📺 直播源检测

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["📡 源发现与探测"]
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: 🔄 检测与更新直播源
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: false

      - name: 🐍 配置 Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 安装依赖
        run: |
          echo "::group::依赖安装详情"
          pip install -r requirements.txt
          echo "::endgroup::"

      - name: 🌐 启用 IPv6 (Cloudflare WARP)
        if: vars.ENABLE_IPV6 == 'true'
        run: |
          echo "::group::安装 Cloudflare WARP"
          sudo apt-get update
          sudo apt-get install -y curl gpg lsb-release
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install -y cloudflare-warp
          echo "::endgroup::"

          echo "::group::注册并连接 WARP"
          sudo warp-cli --accept-tos registration new
          sudo warp-cli --accept-tos connect

          MAX_ATTEMPTS=12
          ATTEMPT=1
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            if curl -6 -sL -o /dev/null --max-time 5 https://ipv6.test-ipv6.com/; then
              echo "✅ IPv6 连接成功!"
              break
            fi
            echo "⏳ 等待 IPv6 ($ATTEMPT/$MAX_ATTEMPTS)..."
            sleep 10
            ATTEMPT=$((ATTEMPT + 1))
          done

          if [ $ATTEMPT -gt $MAX_ATTEMPTS ]; then
            echo "⚠️ IPv6 连接失败，继续使用 IPv4 模式"
          else
            IPV6_ADDR=$(curl -6 -s --max-time 5 https://ifconfig.co 2>/dev/null || echo "unknown")
            echo "🌐 IPv6 地址: $IPV6_ADDR"
          fi
          echo "::endgroup::"

      # ── 三阶段流水线 ──
      - name: 🔍 阶段1 — 抓取直播源 & 黑白名单过滤
        env:
          PYTHONUNBUFFERED: 1
          ENABLE_IPV6: ${{ vars.ENABLE_IPV6 }}
        run: stdbuf -oL python run_ci.py 1

      - name: 🚀 阶段2 — 并发测速 & 流校验
        env:
          PYTHONUNBUFFERED: 1
          ENABLE_IPV6: ${{ vars.ENABLE_IPV6 }}
        run: stdbuf -oL python run_ci.py 2

      - name: 🧠 阶段3 — 模板进化 & 成品输出
        env:
          PYTHONUNBUFFERED: 1
          ENABLE_IPV6: ${{ vars.ENABLE_IPV6 }}
        run: stdbuf -oL python run_ci.py 3

      - name: 📊 运行统计
        if: always()
        run: |
          echo "## 📋 运行统计报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 指标 | 数值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          if [ -f output/live.txt ]; then
            LIVE_COUNT=$(grep -c '' output/live.txt 2>/dev/null || echo "0")
            echo "| 📺 存活频道数 | ${LIVE_COUNT} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 📺 存活频道数 | 文件不存在 |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f output/live.m3u ]; then
            M3U_COUNT=$(grep -c '^#EXTINF' output/live.m3u 2>/dev/null || echo "0")
            echo "| 📡 M3U 条目数 | ${M3U_COUNT} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 📡 M3U 条目数 | 文件不存在 |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f output/epg.xml ]; then
            EPG_SIZE=$(du -h output/epg.xml | cut -f1)
            echo "| 📖 EPG XML 大小 | ${EPG_SIZE} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 📖 EPG XML 大小 | 文件不存在 |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f output/epg.xml.gz ]; then
            EPG_GZ_SIZE=$(du -h output/epg.xml.gz | cut -f1)
            echo "| 📦 EPG GZ 大小 | ${EPG_GZ_SIZE} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 📦 EPG GZ 大小 | 文件不存在 |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f output/unmatched.txt ]; then
            UNMATCHED_COUNT=$(grep -c '' output/unmatched.txt 2>/dev/null || echo "0")
            echo "| ⚠️ 未匹配频道数 | ${UNMATCHED_COUNT} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| ⚠️ 未匹配频道数 | 0 |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f output/log.txt ]; then
            LOG_SIZE=$(du -h output/log.txt | cut -f1)
            echo "| 📝 日志大小 | ${LOG_SIZE} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 📝 日志大小 | 文件不存在 |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f config/demo.txt ]; then
            DEMO_COUNT=$(grep -c '' config/demo.txt 2>/dev/null || echo "0")
            echo "| 🎯 模板频道数 | ${DEMO_COUNT} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🎯 模板频道数 | 文件不存在 |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f output/log.txt ]; then
            SPEED_PASS=$(grep -ci '✅\|pass\|ok\|success\|存活\|可用' output/log.txt 2>/dev/null || echo "N/A")
            SPEED_FAIL=$(grep -ci '❌\|fail\|timeout\|超时\|不可用\|失活' output/log.txt 2>/dev/null || echo "N/A")
            echo "| ✅ 测速通过数 | ${SPEED_PASS} |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ 测速失败数 | ${SPEED_FAIL} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| ✅ 测速通过数 | N/A |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ 测速失败数 | N/A |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_⏱ 运行时间: $(date +'%Y-%m-%d %H:%M:%S')_" >> $GITHUB_STEP_SUMMARY

      - name: 💾 提交并推送
        run: |
          echo "::group::变更检测"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A config/ output/ || git add -f config/ output/
          if ! git diff --staged --quiet; then
            CHANGED_COUNT=$(git diff --staged --name-only | wc -l | tr -d ' ')
            CHANGED_FILES=$(git diff --staged --name-only | tr '\n' ' ')
            echo "变更文件数: ${CHANGED_COUNT}"
            echo "变更文件列表: ${CHANGED_FILES}"
            echo "::endgroup::"
            git commit -m "🔄 Auto Update: $(date +'%Y-%m-%d %H:%M')"
            git stash --include-untracked || true
            git pull --rebase origin main
            git stash pop || true
            git push
          else
            echo "没有发现任何变更，跳过提交。"
            echo "::endgroup::"
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> ✅ 本次运行无变更，无需提交" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 🚨 运行异常
        if: failure()
        run: |
          echo "## 🚨 运行失败告警" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ❌ **本次工作流运行失败，请检查上方日志定位原因**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 详情 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔗 运行链接 | [查看日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏷️ 触发分支 | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| ⏰ 失败时间 | $(date +'%Y-%m-%d %H:%M:%S') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*⚠️ 具体失败原因请查看对应阶段的日志*" >> $GITHUB_STEP_SUMMARY
